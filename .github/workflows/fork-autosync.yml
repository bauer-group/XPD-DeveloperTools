# =============================================================================
# Fork Auto-Sync
# =============================================================================
# Keeps a whole organization of forks tagged and current with their upstreams.
#
# Two steps, in this order:
#   1. Tag   - every fork in the org gets the selector topic (default
#              `forked-repo`). Without this a newly created fork would never be
#              picked up by step 2.
#   2. Sync  - gh-fork-autosync updates each tagged fork: the mirror branch via
#              the merge-upstream API, and - when the fork's default branch
#              differs - a server-side merge forward. The forks themselves need
#              no workflow installed.
#
# ┌─ Token ─────────────────────────────────────────────────────────────┐
# │ Secret: DEVELOPERTOOLSFORKSYNC_PAT                                  │
# │ Stored in the `automation` GitHub Environment.                      │
# │                                                                     │
# │ A fine-grained PAT is scoped to ONE resource owner, so this needs   │
# │ its own token issued for the target org - DEVELOPERTOOLS_PAT covers │
# │ bauer-group and cannot reach mirrored-projects.                     │
# │                                                                     │
# │ Fine-grained permissions (on the target org, all repositories):     │
# │   Administration:  Read and write   PUT /repos/{o}/{r}/topics       │
# │   Contents:        Read and write   merge-upstream + merges         │
# │   Issues:          Read and write   conflict issues + labels        │
# │   Metadata:        Read             always granted; repo listing    │
# │                                                                     │
# │ Classic PAT equivalent: `repo` (plus `read:org` for org listing).   │
# └─────────────────────────────────────────────────────────────────────┘
# =============================================================================

name: 🔄 Fork Auto-Sync

on:
  schedule:
    - cron: '0 5 * * 0' # Weekly, Sunday 05:00 UTC (before devtools-automation)
  workflow_dispatch:
    inputs:
      org:
        description: 'Organization holding the forks'
        required: false
        default: 'mirrored-projects'
      topic:
        description: 'Selector topic for the forks'
        required: false
        default: 'forked-repo'
      skip-tagging:
        description: 'Skip step 1 and only sync already tagged forks'
        type: boolean
        default: false
      dry-run:
        description: 'Preview only, change nothing'
        type: boolean
        default: true

permissions:
  contents: read
  issues: write # collector issue for conflicted forks, in this repo

jobs:
  sync:
    name: 'Tag + sync forks (${{ inputs.org || ''mirrored-projects'' }})'
    runs-on: ubuntu-latest
    environment: automation
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.DEVELOPERTOOLSFORKSYNC_PAT }}
    steps:
      - name: Check DEVELOPERTOOLSFORKSYNC_PAT
        id: auth
        env:
          TOKEN: ${{ secrets.DEVELOPERTOOLSFORKSYNC_PAT }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::DEVELOPERTOOLSFORKSYNC_PAT is not configured. Skipping."
            echo "::warning::See the workflow file header for the required permissions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.auth.outputs.skip != 'true'

      - name: Resolve parameters
        if: steps.auth.outputs.skip != 'true'
        id: params
        env:
          # A scheduled run carries no inputs, so the defaults are repeated here.
          IS_SCHEDULE: ${{ github.event_name == 'schedule' }}
          IN_ORG: ${{ inputs.org }}
          IN_TOPIC: ${{ inputs.topic }}
          IN_DRY_RUN: ${{ inputs.dry-run }}
          IN_SKIP_TAGGING: ${{ inputs.skip-tagging }}
        run: |
          if [ "$IS_SCHEDULE" = "true" ]; then
            ORG="mirrored-projects"
            TOPIC="forked-repo"
            DRY=""                # the schedule exists to apply changes
            SKIP_TAGGING="false"
          else
            ORG="${IN_ORG:-mirrored-projects}"
            TOPIC="${IN_TOPIC:-forked-repo}"
            # Manual runs preview by default so a dispatch cannot surprise anyone.
            [ "$IN_DRY_RUN" = "true" ] && DRY="--dry-run" || DRY=""
            SKIP_TAGGING="$IN_SKIP_TAGGING"
          fi

          {
            echo "org=$ORG"
            echo "topic=$TOPIC"
            echo "dry=$DRY"
            echo "skip-tagging=$SKIP_TAGGING"
          } >> "$GITHUB_OUTPUT"

          echo "org=$ORG topic=$TOPIC dry='$DRY' skip-tagging=$SKIP_TAGGING"

      # --- Step 1: make sure every fork carries the selector topic ------------
      - name: Tag forks
        if: steps.auth.outputs.skip != 'true' && steps.params.outputs.skip-tagging != 'true'
        env:
          ORG: ${{ steps.params.outputs.org }}
          TOPIC: ${{ steps.params.outputs.topic }}
          DRY: ${{ steps.params.outputs.dry }}
        run: |
          set -o pipefail
          python services/devtools/scripts/gh-topic-manager.py \
            -o "$ORG" --fork --sync "$TOPIC" --limit 1000 $DRY 2>&1 \
            | tee /tmp/tag-output.log

      # --- Step 2: sync every tagged fork from its upstream -------------------
      - name: Sync forks
        if: steps.auth.outputs.skip != 'true'
        env:
          ORG: ${{ steps.params.outputs.org }}
          TOPIC: ${{ steps.params.outputs.topic }}
          DRY: ${{ steps.params.outputs.dry }}
          # Conflicts are collected into one issue here, not into the forks:
          # GitHub disables issues on forks by default, so a per-fork issue
          # cannot be created for any repository in mirrored-projects.
          ISSUE_REPO: ${{ github.repository }}
          # That issue lives in THIS repo, which the fork PAT cannot reach - a
          # fine-grained PAT is scoped to one org. GITHUB_TOKEN owns this repo,
          # so the issue operations run under it instead.
          ISSUE_GH_TOKEN: ${{ github.token }}
        run: |
          # pipefail so tee cannot mask a non-zero exit. The script exits
          # non-zero on conflicts and errors, failing the job on purpose - the
          # summary and the collector issue carry the detail.
          set -o pipefail
          python services/devtools/scripts/gh-fork-autosync.py \
            -o "$ORG" --topic "$TOPIC" --issue-repo "$ISSUE_REPO" $DRY 2>&1 \
            | tee /tmp/sync-output.log

      - name: Job summary
        if: always()
        env:
          SKIP: ${{ steps.auth.outputs.skip }}
          JOB_STATUS: ${{ job.status }}
          ORG: ${{ steps.params.outputs.org }}
          TOPIC: ${{ steps.params.outputs.topic }}
          DRY: ${{ steps.params.outputs.dry }}
        run: |
          if [ "$SKIP" = "true" ]; then
            {
              echo "## ⚠️ Fork Auto-Sync — Skipped"
              echo ""
              echo "\`DEVELOPERTOOLSFORKSYNC_PAT\` is not configured."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## 🔄 Fork Auto-Sync"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Org** | \`${ORG}\` |"
            echo "| **Topic** | \`${TOPIC}\` |"
            echo "| **Mode** | ${DRY:-apply} |"
            echo "| **Status** | ${JOB_STATUS} |"
            echo ""
            for stage in tag sync; do
              log="/tmp/${stage}-output.log"
              [ -f "$log" ] || continue
              echo "<details><summary>${stage} output</summary>"
              echo ""
              echo '```'
              sed 's/\x1b\[[0-9;]*m//g' "$log"
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            done
            echo "> A red job means at least one fork hit a merge conflict or an"
            echo "> error. Conflicts open an issue in the affected repository."
          } >> "$GITHUB_STEP_SUMMARY"
